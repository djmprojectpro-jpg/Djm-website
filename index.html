<!-- ==================== QUOTE FORM (REAL EMAILJS) ==================== -->
<section id="quote" class="max-w-3xl mx-auto px-6 py-16">
    <div class="text-center mb-10">
        <h2 class="text-4xl font-bold tracking-tighter">Get Your Free Quote</h2>
        <p class="text-zinc-400 mt-2">Licensed &amp; insured • Fast response within 2 hours</p>
    </div>

    <form id="quoteForm" onsubmit="sendRealQuote(event)" 
          class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Name -->
            <div>
                <label class="block text-sm font-medium mb-1.5">Full Name</label>
                <input type="text" id="name" name="name" required
                       class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-orange-500"
                       placeholder="John Smith">
            </div>
            
            <!-- Phone -->
            <div>
                <label class="block text-sm font-medium mb-1.5">Phone Number</label>
                <input type="tel" id="phone" name="phone" required
                       class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-orange-500"
                       placeholder="(272) 394-5428">
            </div>
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium mb-1.5">Email Address</label>
            <input type="email" id="email" name="email" required
                   class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-3.5 focus:outline-none focus:border-orange-500"
                   placeholder="you@email.com">
        </div>

        <!-- Project Type / Description -->
        <div>
            <label class="block text-sm font-medium mb-1.5">Project Details</label>
            <textarea id="message" name="message" rows="4" required
                      class="w-full bg-black border border-zinc-700 rounded-3xl px-5 py-4 focus:outline-none focus:border-orange-500 resize-y"
                      placeholder="Deck 20x30, composite, Lehighton area... or describe your project"></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-600 active:scale-[0.985] transition-all py-5 text-xl font-bold rounded-3xl shadow-lg">
            Send Quote Request
        </button>

        <p class="text-center text-xs text-zinc-500">We’ll reply within 2 hours • No obligation</p>
    </form>
</section>
