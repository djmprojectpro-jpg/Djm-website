<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Portal • DJM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-3xl font-bold mb-6">Contractor Portal • DJM Project Pro's</h1>
    
    <button onclick="login()" class="w-full bg-orange-600 py-4 text-xl font-bold rounded-3xl mb-8">LOG IN AS DYLAN</button>

    <div id="dash" class="hidden">
        <div class="flex gap-3 mb-6 border-b pb-3">
            <button onclick="tab(1)" class="flex-1 py-3 bg-zinc-800">Overview</button>
            <button onclick="tab(2)" class="flex-1 py-3 bg-zinc-800">Quotes</button>
            <button onclick="tab(3)" class="flex-1 py-3 bg-zinc-800">Jobs</button>
        </div>

        <button onclick="addRow()" class="block w-full bg-orange-600 py-5 text-xl rounded-3xl">Create New Quote → Adds Row Below ✅</button>
        <table class="w-full mt-6 border"><tbody id="list"></tbody></table>

        <button onclick="aiSpeak()" class="block w-full bg-emerald-600 py-5 text-xl rounded-3xl mt-6">Ask AI Coach → See Answer Below ✅</button>
        <div id="aiText" class="mt-4 text-emerald-400"></div>
    </div>

    <script>
        function login() {
            document.getElementById('dash').classList.remove('hidden');
            tab(1);
        }
        function tab(n) {
            alert('Tab ' + n + ' loaded ✅');
        }
        function addRow() {
            const row = document.createElement('tr');
            row.innerHTML = '<td class="border p-3">New Customer • Roof Repair • $6,200</td>';
            document.getElementById('list').appendChild(row);
        }
        function aiSpeak() {
            document.getElementById('aiText').innerHTML = '🤖 AI Coach: Price it at $6,200. Schedule next week? (Message appears on page)';
        }
    </script>
</body>
</html>
