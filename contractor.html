<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Portal • DJM Project Pro's</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0A0A] text-white">

    <!-- Navbar -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 bg-orange-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold text-2xl">D</span>
                    </div>
                    <div>
                        <div class="font-bold text-2xl tracking-tighter">DJM Project Pro's</div>
                        <div class="text-[10px] text-orange-500 font-medium -mt-1 tracking-[1.5px]">Contractor Portal</div>
                    </div>
                </div>
                <div id="navUser" class="hidden items-center gap-x-3">
                    <span id="navUsername" class="text-sm text-zinc-400"></span>
                    <button onclick="logout()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Screen -->
    <div id="authScreen" class="max-w-md mx-auto mt-12 px-6">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            
            <div class="flex bg-zinc-800 rounded-2xl p-1 mb-8">
                <button onclick="showAuthTab(0)" class="flex-1 py-3 rounded-2xl font-semibold bg-orange-600" id="authTab0">Login</button>
                <button onclick="showAuthTab(1)" class="flex-1 py-3 rounded-2xl font-semibold" id="authTab1">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    <input id="loginUsername" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="Username">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <input id="loginPassword" type="password" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="••••••••">
                </div>
                <button onclick="loginUser()" class="w-full bg-orange-600 hover:bg-orange-500 py-5 text-xl font-bold rounded-3xl">
                    LOG IN
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Choose Username</label>
                    <input id="regUsername" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="yourname">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Create Password</label>
                    <input id="regPassword" type="password" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="••••••••">
                </div>
                <button onclick="registerUser()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 text-xl font-bold rounded-3xl">
                    CREATE ACCOUNT
                </button>
            </div>

        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto px-6 pb-20">
        
        <div class="flex justify-between items-center my-8">
            <div>
                <h1 class="text-3xl font-bold">Dashboard</h1>
                <p class="text-zinc-400">Welcome back, <span id="welcomeName"></span> <span id="roleBadge"></span></p>
            </div>
            <button onclick="logout()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm">Logout</button>
        </div>

        <!-- Tabs -->
        <div class="flex bg-zinc-900 rounded-3xl p-1 mb-6 text-sm w-fit">
            <button onclick="showTab(0)" class="tab-btn px-8 py-3 rounded-3xl font-semibold" id="tab0">Overview</button>
            <button onclick="showTab(1)" class="tab-btn px-8 py-3 rounded-3xl font-semibold" id="tab1">Quotes</button>
            <button onclick="showTab(2)" class="tab-btn px-8 py-3 rounded-3xl font-semibold" id="tab2">Jobs</button>
            <button onclick="showTab(3)" class="tab-btn px-8 py-3 rounded-3xl font-semibold" id="tab3">AI Coach</button>
            <button onclick="showTab(4)" class="tab-btn px-8 py-3 rounded-3xl font-semibold hidden" id="tab4">Admin</button>
        </div>

        <!-- Overview -->
        <div id="panel-0" class="tab-panel">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7">
                    <div class="text-5xl font-bold text-orange-500">14</div>
                    <div class="text-zinc-400 mt-1">Active Jobs</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7">
                    <div class="text-5xl font-bold text-emerald-400">8</div>
                    <div class="text-zinc-400 mt-1">New Quotes Today</div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7">
                    <div class="text-3xl font-bold">$47,800</div>
                    <div class="text-zinc-400 mt-1">Pipeline this month ↑ 22%</div>
                </div>
            </div>
            <button onclick="showTab(1)" class="bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-3xl font-bold text-lg">+ Create New Quote</button>
        </div>

        <!-- Quotes -->
        <div id="panel-1" class="tab-panel hidden">
            <button onclick="showQuoteForm()" class="mb-6 bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-3xl font-bold text-lg">+ Create New Quote</button>

            <div id="quoteForm" class="hidden bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Client Name</label>
                        <input id="clientName" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="John Smith">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Project</label>
                        <input id="projectType" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="Deck 20x30 Composite">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Amount ($)</label>
                    <input id="quoteAmount" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="12500">
                </div>
                <div class="flex gap-4">
                    <button onclick="submitQuote()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-3xl font-bold">Save Quote</button>
                    <button onclick="hideQuoteForm()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-3xl font-bold">Cancel</button>
                </div>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
                <h3 class="font-bold text-xl mb-5">Recent Quotes</h3>
                <div id="quotesList" class="space-y-4"></div>
            </div>
        </div>

        <!-- Jobs -->
        <div id="panel-2" class="tab-panel hidden">
            <button onclick="addNewJob()" class="mb-6 bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-3xl font-bold text-lg">+ Add New Job</button>
            <div id="jobsList" class="space-y-4"></div>
        </div>

        <!-- AI Coach -->
        <div id="panel-3" class="tab-panel hidden">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 mb-6 min-h-[280px]" id="aiChat">
                <div class="text-emerald-400">AI Coach: Hi! What do you need help with today?</div>
            </div>
            <div class="flex gap-3">
                <input id="aiInput" type="text" placeholder="How should I price a 400 sq ft composite deck?" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg">
                <button onclick="askAI()" class="bg-orange-600 hover:bg-orange-500 px-10 rounded-3xl font-bold">Ask</button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="panel-4" class="tab-panel hidden">
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
                <h3 class="font-bold text-xl mb-5">Admin Tools</h3>
                <div class="bg-zinc-800 rounded-2xl p-5">
                    <div class="font-semibold mb-2">Registered Contractors</div>
                    <div id="adminUserList" class="text-sm text-zinc-400"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentUser = null;

        function showAuthTab(tab) {
            if (tab === 0) {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('authTab0').classList.add('bg-orange-600');
                document.getElementById('authTab1').classList.remove('bg-orange-600');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('authTab0').classList.remove('bg-orange-600');
                document.getElementById('authTab1').classList.add('bg-orange-600');
            }
        }

        function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            if (username.toLowerCase() === "admin" && password === "Bree1223!") {
                currentUser = { username: "admin", role: "admin" };
                localStorage.setItem('djm_current_user', JSON.stringify(currentUser));
                enterDashboard();
                return;
            }

            let users = JSON.parse(localStorage.getItem('djm_users') || '{}');
            if (users[username] && users[username] === password) {
                currentUser = { username: username, role: "contractor" };
                localStorage.setItem('djm_current_user', JSON.stringify(currentUser));
                enterDashboard();
                return;
            }

            alert("Invalid username or password");
        }

        function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            let users = JSON.parse(localStorage.getItem('djm_users') || '{}');
            if (users[username]) {
                alert("Username already exists");
                return;
            }

            users[username] = password;
            localStorage.setItem('djm_users', JSON.stringify(users));
            alert("Account created! You can now log in.");
            showAuthTab(0);
        }

        function enterDashboard() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('navUser').classList.remove('hidden');
            document.getElementById('navUsername').innerText = currentUser.username;
            document.getElementById('welcomeName').innerText = currentUser.username;

            if (currentUser.role === "admin") {
                document.getElementById('tab4').classList.remove('hidden');
                document.getElementById('roleBadge').innerHTML = `<span class="ml-2 px-3 py-1 bg-orange-600 text-xs rounded-full">ADMIN</span>`;
            } else {
                document.getElementById('tab4').classList.add('hidden');
                document.getElementById('roleBadge').innerHTML = `<span class="ml-2 px-3 py-1 bg-zinc-700 text-xs rounded-full">CONTRACTOR</span>`;
            }

            loadQuotes();
            loadJobs();
            showTab(0);
        }

        function logout() {
            localStorage.removeItem('djm_current_user');
            location.reload();
        }

        function showTab(n) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach((btn, i
