<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Portal • DJM Project Pro's</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0A0A] text-white">

    <!-- Navbar -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 bg-orange-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold text-2xl">D</span>
                    </div>
                    <div>
                        <div class="font-bold text-2xl tracking-tighter">DJM Project Pro's</div>
                        <div class="text-[10px] text-orange-500 font-medium -mt-1 tracking-[1.5px]">Contractor Portal</div>
                    </div>
                </div>
                <div id="navUser" class="hidden items-center gap-x-3">
                    <span id="navUsername" class="text-sm text-zinc-400"></span>
                    <button onclick="logout()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Auth Screen -->
    <div id="authScreen" class="max-w-md mx-auto mt-12 px-6">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            
            <div class="flex bg-zinc-800 rounded-2xl p-1 mb-8">
                <button onclick="showAuthTab(0)" class="flex-1 py-3 rounded-2xl font-semibold bg-orange-600" id="authTab0">Login</button>
                <button onclick="showAuthTab(1)" class="flex-1 py-3 rounded-2xl font-semibold" id="authTab1">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    <input id="loginUsername" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="admin or your name">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <input id="loginPassword" type="password" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="••••••••">
                </div>
                <button onclick="loginUser()" class="w-full bg-orange-600 hover:bg-orange-500 py-5 text-xl font-bold rounded-3xl">
                    LOG IN
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Choose Username</label>
                    <input id="regUsername" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="yourname">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Create Password</label>
                    <input id="regPassword" type="password" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-lg" placeholder="••••••••">
                </div>
                <button onclick="registerUser()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 text-xl font-bold rounded-3xl">
                    CREATE ACCOUNT
                </button>
            </div>

        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto px-6 pb-20">
        <div class="flex justify-between items-center my-8">
            <div>
                <h1 class="text-3xl font-bold">Dashboard</h1>
                <p class="text-zinc-400">Welcome back, <span id="welcomeName"></span></p>
            </div>
            <button onclick="logout()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm">Logout</button>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-4">Welcome to the Contractor Portal</h2>
            <p class="text-zinc-400">Login successful! This area is protected.</p>
            
            <div class="mt-8">
                <button onclick="alert('Quotes, Jobs, and AI Coach will go here')" 
                        class="bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-3xl font-bold text-lg">
                    Go to Tools
                </button>
            </div>
        </div>
    </div>

    <script>
        function showAuthTab(tab) {
            if (tab === 0) {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('authTab0').classList.add('bg-orange-600');
                document.getElementById('authTab1').classList.remove('bg-orange-600');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('authTab0').classList.remove('bg-orange-600');
                document.getElementById('authTab1').classList.add('bg-orange-600');
            }
        }

        function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            // Admin login
            if (username.toLowerCase() === "admin" && password === "Bree1223!") {
                localStorage.setItem('djm_logged_in', 'admin');
                enterDashboard('Admin');
                return;
            }

            // Contractor login
            let users = JSON.parse(localStorage.getItem('djm_users') || '{}');
            if (users[username] && users[username] === password) {
                localStorage.setItem('djm_logged_in', username);
                enterDashboard(username);
                return;
            }

            alert("Invalid username or password");
        }

        function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !password) {
                alert("Please enter username and password");
                return;
            }

            let users = JSON.parse(localStorage.getItem('djm_users') || '{}');

            if (users[username]) {
                alert("Username already exists");
                return;
            }

            users[username] = password;
            localStorage.setItem('djm_users', JSON.stringify(users));
            alert("Account created! You can now log in.");
            showAuthTab(0);
        }

        function enterDashboard(name) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('welcomeName').innerText = name;
        }

        function logout() {
            localStorage.removeItem('djm_logged_in');
            location.reload();
        }

        // Auto-login if already logged in
        window.onload = function() {
            const loggedIn = localStorage.getItem('djm_logged_in');
            if (loggedIn) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('welcomeName').innerText = loggedIn;
            }
        }
    </script>
</body>
</html>
